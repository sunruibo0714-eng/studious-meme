<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孙睿博的个人网页</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #74abe2, #5563c1);
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 90%;
        }
        .text-center { text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.9; }
        .btn {
            background: white; color: #5563c1; border: none; padding: 12px 24px;
            font-size: 1rem; font-weight: bold; border-radius: 25px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.2s; margin-top: 20px;
        }
        .btn:hover { background: #f0f2f5; transform: scale(1.05); }
        
        /* 区域切换 */
        #diary-zone, #edit-zone { display: none; }
        
        /* 日志样式 */
        .diary-list { max-height: 350px; overflow-y: auto; margin-top: 20px; text-align: left; }
        .diary-item {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px; border-radius: 10px; margin-top: 15px;
        }
        .diary-date { font-size: 0.9rem; opacity: 0.7; margin-bottom: 5px; font-weight: bold; }
        
        /* 编辑器样式 */
        textarea {
            width: 100%; height: 100px; background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 10px;
            color: white; padding: 15px; font-size: 1rem; box-sizing: border-box; resize: none; margin-bottom: 15px;
        }
        input {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            margin-bottom: 15px; box-sizing: border-box; background: white; color: #333;
        }
        input[type="password"] { background: rgba(255,255,255,0.9); }

        /* 后台删除管理列表 */
        .admin-diary-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.2); padding: 10px 15px; border-radius: 8px; margin-top: 10px;
        }
        .delete-btn {
            background: #ff4d4d; color: white; border: none; padding: 5px 12px;
            border-radius: 15px; cursor: pointer; font-size: 0.85rem;
        }
        .delete-btn:hover { background: #ff3333; }
    </style>
</head>
<body>

    <div class="container">
        <div id="home-zone" class="text-center">
            <h1>孙睿博的个人网页</h1>
            <p>于二零二六年六月十五日创建</p>
            <p>网页创建合作伙伴 gemini</p>
            <button class="btn" onclick="switchZone('diary-zone')">进入个人日志 📖</button>
        </div>

        <div id="diary-zone">
            <h2 class="text-center">公开日志</h2>
            <div class="diary-list" id="diary-container">
                </div>
            <div class="text-center" style="margin-top: 30px;">
                <button class="btn" onclick="switchZone('edit-zone')" style="background: #ffeb3b; color: #333;">管理/写新日志 ✏️</button>
                <button class="btn" onclick="switchZone('home-zone')" style="background: transparent; color: white; border: 1px solid white; margin-left: 10px;">返回主页</button>
            </div>
        </div>

        <div id="edit-zone">
            <h2>发布新日志</h2>
            
            <label>超级密码 (GitHub Token):</label>
            <input type="password" id="gh-token" placeholder="粘贴你的 ghp_... 令牌">
            
            <label>日志日期:</label>
            <input type="text" id="diary-date-input" placeholder="例如：2026年6月15日">
            
            <label>日志内容:</label>
            <textarea id="diary-content-input" placeholder="今天发生了什么好玩的事..."></textarea>
            
            <div class="text-center">
                <button class="btn" id="save-btn" onclick="addNewDiarySubmit()" style="background: #4caf50; color: white; margin-top:0;">直接一键发布 🚀</button>
            </div>

            <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.2); margin: 25px 0;">

            <h2>删除过往日志</h2>
            <div id="admin-diary-list" style="max-height: 200px; overflow-y: auto;">
                </div>

            <div class="text-center" style="margin-top: 20px;">
                <button class="btn" onclick="switchZone('diary-zone')" style="background: transparent; color: white; border: 1px solid white;">返回日志页</button>
            </div>
        </div>
    </div>

    <script id="diary-database" type="application/json">
    [
        
    ]
    </script>

    <script>
        // 🛠️ 【唯一需要配置的地方】
        const GITHUB_CONFIG = {
            owner: "sunruibo0714-eng",     // 比如 "sunruibo"
            repo: "studious-meme",           // 比如 "my-website"
            path: "index.html"           // 保持不变
        };

        let currentFileSha = ""; // 文件锁

        // 页面切换
        function switchZone(zoneId) {
            document.getElementById('home-zone').style.display = 'none';
            document.getElementById('diary-zone').style.display = 'none';
            document.getElementById('edit-zone').style.display = 'none';
            document.getElementById(zoneId).style.display = 'block';
            
            if(zoneId === 'diary-zone') {
                renderDiaries();
            }
            if(zoneId === 'edit-zone') {
                const today = new Date();
                document.getElementById('diary-date-input').value = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;
                renderAdminDiaries();
                fetchCurrentSha();
            }
        }

        // 获取当前数据列表
        function getDiariesFromDb() {
            return JSON.parse(document.getElementById('diary-database').textContent);
        }

        // 渲染公开日志列表
        function renderDiaries() {
            const diaries = getDiariesFromDb();
            const container = document.getElementById('diary-container');
            if(diaries.length === 0) { container.innerHTML = "<p class='text-center'>暂无日志内容</p>"; return; }
            
            let html = "";
            diaries.forEach(item => {
                html += `<div class="diary-item"><div class="diary-date">${item.date}</div><div>${item.content}</div></div>`;
            });
            container.innerHTML = html;
        }

        // 渲染后台带删除按钮的列表
        function renderAdminDiaries() {
            const diaries = getDiariesFromDb();
            const adminContainer = document.getElementById('admin-diary-list');
            if(diaries.length === 0) { adminContainer.innerHTML = "<p style='font-size:0.9rem;opacity:0.6;'>暂无可以删除的日志</p>"; return; }

            let html = "";
            diaries.forEach((item, index) => {
                // 限制一下显示字数防止排版乱
                const shortContent = item.content.length > 15 ? item.content.substring(0, 15) + '...' : item.content;
                html += `
                    <div class="admin-diary-item">
                        <span style="font-size:0.9rem;">[${item.date}] ${shortContent}</span>
                        <button class="delete-btn" onclick="deleteDiaryItem(${index})">删除</button>
                    </div>
                `;
            });
            adminContainer.innerHTML = html;
        }

        window.onload = function() { renderDiaries(); }

        function fetchCurrentSha() {
            const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
            fetch(url).then(res => res.json()).then(data => { currentFileSha = data.sha; });
        }

        // 核心功能：添加新日志提交
        function addNewDiarySubmit() {
            const token = document.getElementById('gh-token').value.trim();
            const inputDate = document.getElementById('diary-date-input').value.trim();
            const inputContent = document.getElementById('diary-content-input').value.trim();
            if(!token) return alert('请输入你的 GitHub Token！');
            if(!inputDate || !inputContent) return alert('日期和内容都不能为空！');

            const diaries = getDiariesFromDb();
            diaries.unshift({ date: inputDate, content: inputContent }); // 塞到最前面
            
            pushToGithub(token, diaries, `📝 新增日志: ${inputDate}`);
        }

        // 核心功能：点击删除某一项目
        function deleteDiaryItem(index) {
            const token = document.getElementById('gh-token').value.trim();
            if(!token) return alert('删除日志需要极高的权限，请输入你的 GitHub Token 验证身份！');
            
            const diaries = getDiariesFromDb();
            const targetDate = diaries[index].date;
            
            if(confirm(`确定要永远删除 [${targetDate}] 这篇日志吗？`)) {
                diaries.splice(index, 1); // 从数组里剔除这一项
                pushToGithub(token, diaries, `🗑️ 删除了日志: ${targetDate}`);
            }
        }

        // 把最终修改好的数据打包发射去服务器
        function pushToGithub(token, newDiariesArray, commitMessage) {
            const saveBtn = document.getElementById('save-btn');
            saveBtn.innerText = "云端同步中...";
            saveBtn.disabled = true;

            const rawHtml = document.documentElement.outerHTML;
            const newJsonString = JSON.stringify(newDiariesArray, null, 8);
            const regex = /(<script id="diary-database" type="application\/json">)[\s\S]*?(<\/script>)/;
            let updatedHtml = "<!DOCTYPE html>\n" + rawHtml.replace(regex, `$1\n${newJsonString}\n    $2`);

            const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
            const b64Content = btoa(encodeURIComponent(updatedHtml).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));

            const bodyData = { message: commitMessage, content: b64Content, sha: currentFileSha };

            fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify(bodyData)
            })
            .then(res => {
                if(res.status === 200 || res.status === 201) {
                    alert('🎉 变动成功！GitHub 正在全线同步，1分钟后请强制刷新网页查看！');
                    window.location.reload();
                } else {
                    alert('变动失败，请确保你的 Token 正确且具备修改权限！');
                    saveBtn.innerText = "直接一键发布 🚀";
                    saveBtn.disabled = false;
                }
            })
            .catch(err => {
                alert('网络连接错误：' + err);
                saveBtn.innerText = "直接一键发布 🚀";
                saveBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
</body></html>
